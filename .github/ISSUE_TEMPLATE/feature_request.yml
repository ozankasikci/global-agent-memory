name: Feature request
description: Propose an improvement to the memory workflow, integrations, or dashboard
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today? Concrete examples are especially useful.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful outcome, not only an implementation.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Primary surface
      options: [MCP and agents, Dashboard, Obsidian Vault, CLI and setup, Search and indexing, Security and access, Other]
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: How are you handling this today?
